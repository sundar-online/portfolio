<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundar-online</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── NAVBAR ── */
    /* Global Monochrome Image Filters */
    img,
    .tech-logo,
    .project-image-wrap img,
    .fv-icon img {
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .project-image-wrap:hover img {
      transform: scale(1.05);
    }

    /* ── NAVBAR ── */
    /* Ported to style.css */

    /* ── DASHBOARD LAYOUT ── */
    .dashboard-layout {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 120px auto 40px;
      padding: 0 40px;
      width: 100%;
    }

    .dashboard-left {
      width: 100%;
    }

    @media (max-width: 900px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
        margin-top: 100px;
        padding: 0 24px;
      }
    }

    /* ── HERO SECTION ── */
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0 60px;
      text-align: center;
      min-height: 50vh;
    }

    .hero-inner {
      animation: heroFade 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    @keyframes heroFade {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 5px 16px 5px 10px;
      border-radius: 999px;
      margin-bottom: 22px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 10px #60a5fa;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.85);
      }
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.03em;
      color: rgba(255, 255, 255, 0.9);
      max-width: 700px;
      margin: 0 auto;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(100deg,
          #ffffff 10%,
          #888888 60%,
          #e0e0e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 100%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    .sub {
      margin-top: 18px;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.4);
    }

    .sub span {
      color: rgba(255, 255, 255, 0.15);
      margin: 0 8px;
    }

    /* ── ROLES ── */
    .roles {
      display: flex;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .role-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.038);
      border: 1px solid rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(12px);
      transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
    }

    .role-card:hover {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
    }

    .role-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .role-icon.n1 {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
    }

    .role-icon.n2 {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.05);
    }

    .role-icon svg {
      width: 20px;
      height: 20px;
    }

    .role-info {
      text-align: left;
    }

    .role-title {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: 0.01em;
    }

    .role-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 1px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #000000;
      cursor: pointer;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 1) 0%,
          rgba(220, 220, 220, 1) 100%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
      text-decoration: none;
      font-family: "DM Sans", sans-serif;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(240, 240, 240, 1) 100%);
      box-shadow: 0 0 36px rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn-ghost {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(10px);
      transition: background 0.25s, color 0.25s, transform 0.15s;
      text-decoration: none;
      font-family: "DM Sans", sans-serif;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }

    .btn-ghost svg,
    .btn-primary svg {
      width: 14px;
      height: 14px;
    }

    /* ── SKILLS SECTION ── */
    .skills-section {
      padding: 80px 24px 100px;
      max-width: 900px;
      margin: 0 auto;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      justify-content: center;
    }

    .section-label-line {
      flex: 1;
      max-width: 80px;
      height: 1px;
      background: linear-gradient(to right,
          transparent,
          rgba(255, 255, 255, 0.2));
    }

    .section-label-line.right {
      background: linear-gradient(to left,
          transparent,
          rgba(255, 255, 255, 0.2));
    }

    .section-label-text {
      font-family: "Syne", sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    /* ── SKILLS SECTION ── */
    .skills-section {
      padding: 40px 0 20px;
      width: 100%;
    }

    .section-label {
      justify-content: flex-start;
    }

    .section-label-line.right {
      display: none;
    }

    .compact-grid {
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)) !important;
      gap: 14px !important;
    }

    .compact-grid .skill-pill {
      padding: 16px !important;
    }

    .compact-grid .skill-name {
      display: none !important;
    }

    /* ── DASHBOARD RIGHT (BLOG CARDS) ── */
    .dashboard-right h2 {
      font-family: var(--font-heading);
      font-size: 28px;
      color: var(--text-primary);
      text-align: right;
      margin: 0 0 30px 0;
    }

    .d-post-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
      text-decoration: none;
    }

    .d-post-card:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
    }

    .d-post-vis {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .d-post-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .d-post-content h3 {
      font-family: "Syne", sans-serif;
      font-size: 18px;
      color: var(--text-primary);
      margin: 0 0 8px 0;
      line-height: 1.3;
    }

    .d-post-content p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 16px 0;
      line-height: 1.5;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .d-post-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .d-post-tag {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
      gap: 16px;
      justify-content: center;
    }

    .skill-pill {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: skillFadeIn 0.8s ease both;
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.01),
        0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .skill-pill:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-6px) scale(1.06);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4),
        0 0 20px rgba(255, 255, 255, 0.08);
    }

    @keyframes skillFadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .skill-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .skill-icon svg {
      width: 34px;
      height: 34px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.1));
    }

    .skill-pill:hover .skill-icon {
      transform: scale(1.1);
    }

    .skill-name {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s ease, color 0.3s ease;
    }

    .skill-pill:hover .skill-name {
      opacity: 1;
      color: rgba(255, 255, 255, 0.85);
    }

    /* unified neutral hover glow */
    .skill-pill:hover {
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .skill-pill:hover .skill-name {
      color: rgba(255, 255, 255, 0.9);
    }

    /* ── SCROLL HINT ── */
    .scroll-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      opacity: 0.35;
      animation: scrollBob 2.5s ease infinite;
    }

    @keyframes scrollBob {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.35;
      }

      50% {
        transform: translateY(6px);
        opacity: 0.55;
      }
    }

    .scroll-hint span {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    .scroll-line {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom,
          rgba(255, 255, 255, 0.3),
          transparent);
    }

    /* divider */
    .divider {
      width: 100%;
      max-width: 600px;
      height: 1px;
      background: linear-gradient(to right,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent);
      margin: 0 auto;
    }

    /* ── FEATURED PROJECTS SECTION ── */
    #projects {
      padding: 60px 0 100px;
      width: 100%;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 40px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 32px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      height: 100%;
    }

    .project-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .project-image {
      height: 300px;
      position: relative;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }

    .project-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
          rgba(10, 10, 15, 0.4),
          transparent 30%,
          transparent 70%,
          rgba(10, 10, 15, 0.4));
      pointer-events: none;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .project-card:hover .project-image img {
      transform: scale(1.05);
    }

    .project-content {
      padding: 40px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.03) 0%,
          transparent 100%);
    }

    .project-title {
      font-family: "Syne", sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .project-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .project-metrics {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .metric-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 16px;
      border-radius: 16px;
      min-width: 90px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .project-tag {
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .project-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: auto;
    }

    .btn-project {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      text-decoration: none;
      font-family: "DM Sans", sans-serif;
    }

    .btn-project.btn-demo {
      background: rgba(96, 165, 250, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      box-shadow: 0 4px 20px rgba(96, 165, 250, 0.1);
    }

    .btn-project.btn-demo:hover {
      background: #60a5fa;
      color: #000000;
      box-shadow: 0 8px 30px rgba(96, 165, 250, 0.3);
      transform: translateY(-2px);
    }

    .btn-code {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-code:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-details {
      color: rgba(255, 255, 255, 0.5);
      padding: 12px 8px;
    }

    .btn-details:hover {
      color: var(--text-primary);
    }

    .btn-project svg {
      width: 18px;
      height: 18px;
    }

    /* ── RESPONSIVE OVERHAUL ── */
    @media (max-width: 1200px) {
      .dashboard-layout {
        max-width: 100%;
        gap: 40px;
        grid-template-columns: 1.2fr 0.8fr;
      }

      .project-content {
        padding: 32px;
      }

      .project-title {
        font-size: 28px;
      }
    }

    @media (max-width: 1024px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
        margin-top: 100px;
        gap: 60px;
        width: 100%;
        max-width: 100%;
        padding: 0 24px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .project-card,
      .project-card:nth-child(even) {
        flex-direction: column !important;
        min-height: auto;
      }

      .project-image {
        width: 100%;
        height: 320px;
        flex: none;
      }

      .project-content {
        width: 100%;
        flex: none;
        padding: 40px 32px;
      }
    }

    @media (max-width: 768px) {
      .nav-wrap {
        padding-top: 12px;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      nav {
        padding: 4px 8px;
        gap: 4px;
      }

      .nav-item {
        padding: 8px 12px;
        font-size: 13px;
      }

      .nav-item span {
        display: none;
      }

      .logo-text {
        display: none;
      }

      .nav-logo {
        padding-right: 6px;
        margin-right: 0;
      }

      .hero-section {
        align-items: center;
        text-align: center;
      }

      h1 {
        font-size: 42px;
        text-align: center;
      }

      .roles {
        justify-content: center;
        flex-wrap: wrap;
      }

      .actions {
        justify-content: center;
        width: 100%;
      }

      .dashboard-layout {
        padding: 0 20px;
        margin-top: 80px;
      }

      .project-title {
        font-size: 24px;
      }

      .project-metrics {
        flex-wrap: wrap;
        justify-content: center;
      }

      .project-actions {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
      }

      .btn-project {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 32px;
      }

      .project-image {
        height: 220px;
      }

      .metric-item {
        flex: 1;
        min-width: 100px;
      }

      .nav-cta {
        padding: 6px 12px;
        font-size: 11px;
      }

      .badge {
        margin-bottom: 16px;
      }
    }
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <div class="page">
    <!-- NAV -->
    <!-- NAV PLACEHOLDER -->
    <div id="navbar-target"></div>

    <div class="dashboard-layout">
      <!-- LEFT COLUMN -->
      <div class="dashboard-left">
        <!-- HERO -->
        <section class="hero-section" id="hero">
          <div class="hero-inner">
            <div style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: 16px;
                  margin-bottom: 24px;
                ">
              <h1 style="margin: 0; font-size: 3.5rem; letter-spacing: -0.02em">
                Sundaramoorthy
