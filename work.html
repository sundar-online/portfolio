<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Sundar</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Inline styles specifically for the work page layout alignment matching index.html */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html.light-mode { filter: invert(1) hue-rotate(180deg); }
    html.light-mode img { --nav-active-glow: rgba(255, 255, 255, 0.12); }
    html, body { width: 100%; overflow-x: hidden; background: #000; color: var(--text-primary); font-family: "DM Sans", sans-serif; -webkit-font-smoothing: antialiased; }
    canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .page { position: relative; z-index: 10; }
    /* Global Monochrome Image Filters */
    img, .tech-logo, .project-image-wrap img, .fv-icon img { transition: transform 0.4s ease, filter 0.4s ease; }
    .project-image-wrap:hover img { transform: scale(1.05); }

    /* DASHBOARD LAYOUT */
    .dashboard-layout {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 120px auto 40px;
      padding: 0 40px;
      width: 100%;
    }
    .dashboard-left { width: 100%; }
    
    @media (max-width: 900px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
        margin-top: 100px;
        padding: 0 24px;
      }
    }
    
    /* SKILLS GRID */
    .skills-section {
      margin-top: 20px;
    }
    .section-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    .section-label-line {
      height: 1px;
      width: 40px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.3));
    }
    .section-label-line.right {
      background: linear-gradient(-90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.3));
    }
    .section-label-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 600;
    }
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 60px;
    }
    .skill-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .skill-pill:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .skill-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow: hidden;
      padding: 5px;
    }
    .skill-icon img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      filter: grayscale(100%) contrast(1.2);
      opacity: 0.8;
      transition: filter 0.3s, opacity 0.3s;
    }
    .skill-pill:hover .skill-icon img {
      filter: grayscale(0%) contrast(1);
      opacity: 1;
    }
    .skill-name {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.02em;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* PROJECTS GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 40px;
    }
    @media (max-width: 600px) {
      .projects-grid { grid-template-columns: 1fr; }
    }
    
    .project-card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 32px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      height: 100%;
    }
    .project-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }
    .project-image {
      height: 300px;
      position: relative;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }
    .project-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(10, 10, 15, 0.4), transparent 30%, transparent 70%, rgba(10, 10, 15, 0.4));
      pointer-events: none;
    }
    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .project-card:hover .project-image img { transform: scale(1.05); }
    .project-content {
      padding: 40px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
    }
    .project-title {
      font-family: "Syne", sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .project-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .project-metrics { display: flex; gap: 16px; margin-bottom: 32px; }
    .metric-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 16px;
      border-radius: 16px;
      min-width: 90px;
      text-align: center;
    }
    .metric-label { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
    .metric-value { font-size: 16px; font-weight: 600; color: #ffffff; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px; }
    .project-tag {
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .project-actions { display: flex; align-items: center; gap: 16px; margin-top: auto; }
    .btn-project {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      text-decoration: none;
      font-family: "DM Sans", sans-serif;
    }
    .btn-primary { background: #ffffff; color: #000000; border: none; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); }
    .btn-secondary { background: transparent; color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.4); transform: translateY(-2px); }
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <!-- NAV PLACEHOLDER -->
  <div id="navbar-target"></div>

  <div class="page">
    <div class="dashboard-layout">
      <div class="dashboard-left">
      
        <!-- SKILLS -->
        <section class="skills-section" id="work">
          <div class="section-label">
            <div class="section-label-line"></div>
            <span class="section-label-text">tech stack</span>
            <div class="section-label-line right"></div>
          </div>

          <div class="skills-grid compact-grid">
            <div class="skill-pill sk-html" style="animation-delay: 0s">
              <div class="skill-icon">
                <img src="icons/html.png" alt="HTML" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">HTML</span>
            </div>

            <div class="skill-pill sk-css" style="animation-delay: 0.05s">
              <div class="skill-icon">
                <img src="icons/css-3.png" alt="CSS" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">CSS</span>
            </div>

            <div class="skill-pill sk-js" style="animation-delay: 0.1s">
              <div class="skill-icon">
                <img src="icons/java-script.png" alt="JavaScript" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">JavaScript</span>
            </div>

            <div class="skill-pill sk-react" style="animation-delay: 0.15s">
              <div class="skill-icon">
                <img src="icons/atom.png" alt="React" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">React</span>
            </div>

            <div class="skill-pill sk-next" style="animation-delay: 0.2s">
              <div class="skill-icon">
                <img src="icons/Next.js.png" alt="Next.js" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Next.js</span>
            </div>

            <div class="skill-pill sk-python" style="animation-delay: 0.25s">
              <div class="skill-icon">
                <img src="icons/python.png" alt="Python" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Python</span>
            </div>

            <div class="skill-pill sk-java" style="animation-delay: 0.3s">
              <div class="skill-icon">
                <img src="icons/java.png" alt="Java" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Java</span>
            </div>

            <div class="skill-pill sk-c" style="animation-delay: 0.35s">
              <div class="skill-icon">
                <img src="icons/c.png" alt="C" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">C</span>
            </div>

            <div class="skill-pill sk-cpp" style="animation-delay: 0.4s">
              <div class="skill-icon">
                <img src="icons/c++.png" alt="C++" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">C++</span>
            </div>

            <div class="skill-pill sk-r" style="animation-delay: 0.45s">
              <div class="skill-icon">
                <img src="icons/R.png" alt="R" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">R</span>
            </div>

            <div class="skill-pill sk-mysql" style="animation-delay: 0.5s">
              <div class="skill-icon">
                <img src="icons/MySQL.png" alt="MySQL" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">MySQL</span>
            </div>

            <div class="skill-pill sk-mongo" style="animation-delay: 0.55s">
              <div class="skill-icon">
                <img src="icons/MongoDB.png" alt="MongoDB" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">MongoDB</span>
            </div>

            <div class="skill-pill sk-git" style="animation-delay: 0.6s">
              <div class="skill-icon">
                <img src="icons/Git.png" alt="Git" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Git</span>
            </div>

            <div class="skill-pill sk-docker" style="animation-delay: 0.65s">
              <div class="skill-icon">
                <img src="icons/Docker.png" alt="Docker" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Docker</span>
            </div>

            <div class="skill-pill sk-gcp" style="animation-delay: 0.7s">
              <div class="skill-icon">
                <img src="icons/Google Cloud.png" alt="Google Cloud" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">GCP</span>
            </div>

            <div class="skill-pill sk-playwrite" style="animation-delay: 0.75s">
              <div class="skill-icon">
                <img src="icons/Playwrite.png" alt="Playwrite" style="width: 38px; height: 38px" />
              </div>
              <span class="skill-name">Playwright</span>
            </div>
          </div>
        </section>

        <!-- PROJECTS SECTION -->
        <section id="projects">
          <div class="section-label" style="justify-content: flex-start">
            <div class="section-label-line"></div>
            <span class="section-label-text">projects</span>
          </div>

          <div id="projects-container" class="projects-grid">
            <!-- Projects will be injected here via Fetch -->
          </div>
        </section>
        
      </div>
    </div>
  </div>

  <!-- FOOTER PLACEHOLDER -->
  <div id="footer-target"></div>

  <script src="script.js"></script>
</body>

</html>
