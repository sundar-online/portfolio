<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundar-Blog</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Shared variables in style.css */

    html {
      scroll-behavior: smooth;
    }

    html.light-mode {
      filter: invert(1) hue-rotate(180deg);
    }

    html.light-mode img {
      filter: invert(1) hue-rotate(180deg);
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    /* Ported to style.css */

    .blog-header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      padding: 5px 16px 5px 10px;
      border-radius: 999px;
      margin-bottom: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 10px #60a5fa;
      animation: pulse 2s ease infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .blog-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.15;
    }

    .blog-header h1 em {
      font-style: normal;
      background: linear-gradient(110deg, #ffffff 10%, #888888 60%, #e0e0e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200%
      }

      100% {
        background-position: -200%
      }
    }

    .blog-header p {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    /* Filters */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 44px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: all 0.22s;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Blog Grid */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      width: 100%;
    }

    .blog-card {
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .blog-card:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 30px var(--accent-glow);
    }

    .card-visual {
      height: 180px;
      position: relative;
      background: linear-gradient(135deg, #0a0a0a, #151515);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .card-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-body h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-body p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
    }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .card-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .blog-card:hover .card-arrow {
      background: #ffffff;
      color: #000;
      transform: translateX(4px);
    }

    /* Featured Card */
    .featured-wrap {
      margin-bottom: 48px;
    }

    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      overflow: hidden;
      cursor: pointer;
      min-height: 320px;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .featured-card:hover {
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 50px var(--accent-glow);
      transform: translateY(-6px);
    }

    .featured-visual {
      background: linear-gradient(135deg, #050505, #111111);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .featured-body {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .featured-card {
        grid-template-columns: 1fr;
      }

      .featured-visual {
        height: 240px;
      }

      .page {
        padding: 100px 24px 60px !important;
      }
    }

    @media (max-width: 768px) {
      .nav-wrap {
        padding-top: 12px;
      }

      nav {
        padding: 4px 8px;
      }

      .nav-item span {
        display: none;
      }

      .blog-grid {
        grid-template-columns: 1fr;
      }
    }

    /* MODAL */
    .post-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }

    .post-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .post-modal {
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <!-- NAV PLACEHOLDER -->
  <div id="navbar-target"></div>

  <div class="page" style="max-width: 1200px; margin: 0 auto; width: 100%; padding: 130px 24px 80px;">
    <div class="blog-header">
      <div class="header-tag">
        <div class="header-dot"></div><span>Insights & Articles</span>
      </div>
      <h1>Words,<em> Designs,</em> and Dev Logs</h1>
      <p>Reflections on artificial intelligence, product design, and the journey of a developer.</p>
      <div style="margin-top: 32px;">
        <button class="nav-cta" onclick="openNewPostModal()" style="font-size: 14px; padding: 12px 28px;">New
          Post</button>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-btn active" onclick="filterPosts('all', this)">All</div>
      <div class="filter-btn" onclick="filterPosts('ai', this)">AI & ML</div>
      <div class="filter-btn" onclick="filterPosts('webdev', this)">Web Development</div>
      <div class="filter-btn" onclick="filterPosts('mobile', this)">Mobile</div>
      <div class="filter-btn" onclick="filterPosts('devlog', this)">Dev Logs</div>
    </div>

    <div id="blog-grid" class="blog-grid">
      <!-- Injected via JS -->
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div class="post-overlay" id="view-modal-overlay" onclick="if(event.target==this)closeViewModal()">
    <div class="post-modal">
      <h2 id="vm-title" style="color:white; margin-bottom:10px;"></h2>
      <div id="vm-date" style="color:var(--text-muted); font-size:13px; margin-bottom:20px;"></div>
      <div id="vm-content" style="color:var(--text-secondary); line-height:1.8;"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let blogs = [];
    async function fetchBlogs() {
      try {
        let res = await fetch('/data/blogs.json');
        if (!res.ok) res = await fetch('public/data/blogs.json');
        blogs = await res.json();
        renderBlogs();
      } catch (e) { console.error(e); }
    }

    function renderBlogs(filter = 'all') {
      const grid = document.getElementById('blog-grid');
      const filtered = filter === 'all' ? blogs : blogs.filter(b => b.category === filter);
      grid.innerHTML = filtered.map((b, i) => {
        const type = b.visualType || 'code';
        return `
          <div class="blog-card" onclick="viewPost(${blogs.indexOf(b)})">
            <div class="card-visual" style="background: ${getBlogGradient(type)}">
              ${getBlogIcon(type)}
            </div>
            <div class="card-body">
              <div class="card-tag">${b.category || 'article'}</div>
              <h3>${b.title}</h3>
              <p>${b.content.substring(0, 100)}...</p>
              <div class="card-footer">
                <span class="card-date">${b.date}</span>
                <div class="card-arrow">→</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function getBlogGradient(type) {
      const gradients = {
        code: 'linear-gradient(135deg,rgba(96,165,250,0.1),rgba(96,165,250,0.02))',
        dream: 'linear-gradient(135deg,rgba(167,139,250,0.1),rgba(167,139,250,0.02))',
        neural: 'linear-gradient(135deg,rgba(45,212,191,0.1),rgba(45,212,191,0.02))'
      };
      return gradients[type] || gradients.code;
    }

    function getBlogIcon(type) {
      const icons = {
        code: `<svg viewBox="0 0 64 64" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:40px; opacity:0.8;">
                <rect x="8" y="14" width="48" height="36" rx="4" />
                <path d="M22 26l-8 6 8 6M42 26l8 6-8 6M34 22l-4 20" />
              </svg>`,
        dream: `<svg viewBox="0 0 48 48" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px; opacity:0.8;">
                <circle cx="24" cy="24" r="16" />
                <path d="M24 14v10l6 6" />
              </svg>`,
        neural: `<svg class="big" viewBox="0 0 48 48" fill="none" stroke="#2dd4bf" stroke-width="1.4" stroke-linecap="round" style="width:32px; opacity:0.8;">
                <path d="M24 10v20M14 20l10 10 10-10" />
              </svg>`
      };
      return icons[type] || icons.code;
    }

    function viewPost(idx) {
      const p = blogs[idx];
      document.getElementById('vm-title').textContent = p.title;
      document.getElementById('vm-date').textContent = p.date;
      document.getElementById('vm-content').textContent = p.content;
      document.getElementById('view-modal-overlay').classList.add('open');
    }

    function closeViewModal() { document.getElementById('view-modal-overlay').classList.remove('open'); }
    function filterPosts(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBlogs(cat);
    }
  </script>
  <script src="script.js"></script>
</body>

</html>
