<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundaramoorthy — blog</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --nav-active-bg: rgba(255, 255, 255, 0.08);
      --nav-active-glow: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: #f0f0f0;
      --text-muted: #a0a0a0;
      --surface-dark: #0a0a0a;
      --accent-glow: rgba(255, 255, 255, 0.05);
    }

    html {
      scroll-behavior: smooth;
    }

    html.light-mode {
      filter: invert(1) hue-rotate(180deg);
    }
    
    html.light-mode img {
      filter: invert(1) hue-rotate(180deg);
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .nav-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding-top: 28px;
      pointer-events: none;
    }

    nav {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 999px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        0 8px 32px rgba(0, 0, 0, 0.8), 0 0 40px var(--accent-glow);
      animation: navDrop 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes navDrop {
      from {
        opacity: 0;
        transform: translateY(-24px) scale(0.97)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
      text-decoration: none;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.72;
      transition: opacity 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.06);
    }

    .nav-item.active {
      background: var(--nav-active-bg);
      color: var(--text-primary);
      box-shadow: 0 0 24px var(--nav-active-glow), inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .sep {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.07);
      margin: 0 4px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 18px;
      margin-left: 4px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.3), rgba(96, 165, 250, 0.1));
      border: 1px solid rgba(96, 165, 250, 0.4);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.1);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.4), rgba(96, 165, 250, 0.2));
      box-shadow: 0 8px 32px rgba(96, 165, 250, 0.2);
      transform: scale(1.04);
    }

    .blog-header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      padding: 5px 16px 5px 10px;
      border-radius: 999px;
      margin-bottom: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
    }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #60a5fa;
        box-shadow: 0 0 10px #60a5fa;
        animation: pulse 2s ease infinite;
      }

    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0.4 }
    }

    .blog-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.15;
    }

    .blog-header h1 em {
      font-style: normal;
      background: linear-gradient(110deg, #ffffff 10%, #888888 60%, #e0e0e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% }
      100% { background-position: -200% }
    }

    .blog-header p {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    /* Filters */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 44px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: all 0.22s;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Blog Grid */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      width: 100%;
    }

    .blog-card {
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .blog-card:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 30px var(--accent-glow);
    }

    .card-visual {
      height: 180px;
      position: relative;
      background: linear-gradient(135deg, #0a0a0a, #151515);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .card-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-body h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-body p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
    }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .card-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .blog-card:hover .card-arrow {
      background: #ffffff;
      color: #000;
      transform: translateX(4px);
    }

    /* Featured Card */
    .featured-wrap {
      margin-bottom: 48px;
    }

    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      overflow: hidden;
      cursor: pointer;
      min-height: 320px;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .featured-card:hover {
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 50px var(--accent-glow);
      transform: translateY(-6px);
    }

    .featured-visual {
      background: linear-gradient(135deg, #050505, #111111);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .featured-body {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .featured-card {
        grid-template-columns: 1fr;
      }
      .featured-visual {
        height: 240px;
      }
      .page {
        padding: 100px 24px 60px !important;
      }
    }

    @media (max-width: 768px) {
      .nav-wrap {
        padding-top: 12px;
      }
      nav {
        padding: 4px 8px;
      }
      .nav-item span {
        display: none;
      }
      .blog-grid {
        grid-template-columns: 1fr;
      }
    }

    /* MODAL */
    .post-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }
    .post-overlay.open { opacity: 1; pointer-events: all; }
    .post-modal {
      background: var(--surface-dark);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <div class="nav-wrap">
    <nav>
      <a class="nav-item" href="index.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6L8 2l6 4v7a1 1 0 01-1 1H3a1 1 0 01-1-1V6z" /><path d="M6 14V9h4v5" />
        </svg><span>home</span></a>
      <a class="nav-item" href="index.html#work">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <rect x="2" y="3" width="5" height="5" rx="1" /><rect x="9" y="3" width="5" height="5" rx="1" />
          <rect x="2" y="10" width="5" height="5" rx="1" /><rect x="9" y="10" width="5" height="5" rx="1" />
        </svg><span>work</span></a>
      <a class="nav-item" href="about.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="8" cy="6" r="3" /><path d="M2 14c0-3 2.5-5 6-5s6 2 6 5" />
        </svg><span>about</span></a>
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V3a1 1 0 00-1-1z" /><path d="M5 6h6M5 9h4" />
        </svg><span>blog</span></a>
        
      <div class="sep"></div>
      <button id="theme-toggle" class="nav-item" style="background:none; border:none; padding:10px;">
        <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
          <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </nav>
  </div>

  <div class="page" style="max-width: 1200px; margin: 0 auto; width: 100%; padding: 130px 24px 80px;">
    <div class="blog-header">
      <div class="header-tag"><div class="header-dot"></div><span>Insights & Articles</span></div>
      <h1>Words,<em> Designs,</em> and Dev Logs</h1>
      <p>Reflections on artificial intelligence, product design, and the journey of a developer.</p>
      <div style="margin-top: 32px;">
        <button class="nav-cta" onclick="openNewPostModal()" style="font-size: 14px; padding: 12px 28px;">New Post</button>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-btn active" onclick="filterPosts('all', this)">All</div>
      <div class="filter-btn" onclick="filterPosts('ai', this)">AI & ML</div>
      <div class="filter-btn" onclick="filterPosts('webdev', this)">Web Development</div>
      <div class="filter-btn" onclick="filterPosts('mobile', this)">Mobile</div>
      <div class="filter-btn" onclick="filterPosts('devlog', this)">Dev Logs</div>
    </div>

    <div id="blog-grid" class="blog-grid">
      <!-- Injected via JS -->
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div class="post-overlay" id="view-modal-overlay" onclick="if(event.target==this)closeViewModal()">
    <div class="post-modal">
      <h2 id="vm-title" style="color:white; margin-bottom:10px;"></h2>
      <div id="vm-date" style="color:var(--text-muted); font-size:13px; margin-bottom:20px;"></div>
      <div id="vm-content" style="color:var(--text-secondary); line-height:1.8;"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let blogs = [];
    async function fetchBlogs() {
      try {
        let res = await fetch('/data/blogs.json');
        if(!res.ok) res = await fetch('public/data/blogs.json');
        blogs = await res.json();
        renderBlogs();
      } catch(e) { console.error(e); }
    }

    function renderBlogs(filter = 'all') {
      const grid = document.getElementById('blog-grid');
      const filtered = filter === 'all' ? blogs : blogs.filter(b => b.category === filter);
      grid.innerHTML = filtered.map((b, i) => {
        const type = b.visualType || 'code';
        return `
          <div class="blog-card" onclick="viewPost(${blogs.indexOf(b)})">
            <div class="card-visual" style="background: ${getBlogGradient(type)}">
              ${getBlogIcon(type)}
            </div>
            <div class="card-body">
              <div class="card-tag">${b.category || 'article'}</div>
              <h3>${b.title}</h3>
              <p>${b.content.substring(0, 100)}...</p>
              <div class="card-footer">
                <span class="card-date">${b.date}</span>
                <div class="card-arrow">→</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function getBlogGradient(type) {
      const gradients = {
        code: 'linear-gradient(135deg,rgba(96,165,250,0.1),rgba(96,165,250,0.02))',
        dream: 'linear-gradient(135deg,rgba(167,139,250,0.1),rgba(167,139,250,0.02))',
        neural: 'linear-gradient(135deg,rgba(45,212,191,0.1),rgba(45,212,191,0.02))'
      };
      return gradients[type] || gradients.code;
    }

    function getBlogIcon(type) {
      const icons = {
        code: `<svg viewBox="0 0 64 64" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:40px; opacity:0.8;">
                <rect x="8" y="14" width="48" height="36" rx="4" />
                <path d="M22 26l-8 6 8 6M42 26l8 6-8 6M34 22l-4 20" />
              </svg>`,
        dream: `<svg viewBox="0 0 48 48" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px; opacity:0.8;">
                <circle cx="24" cy="24" r="16" />
                <path d="M24 14v10l6 6" />
              </svg>`,
        neural: `<svg class="big" viewBox="0 0 48 48" fill="none" stroke="#2dd4bf" stroke-width="1.4" stroke-linecap="round" style="width:32px; opacity:0.8;">
                <path d="M24 10v20M14 20l10 10 10-10" />
              </svg>`
      };
      return icons[type] || icons.code;
    }

    function viewPost(idx) {
      const p = blogs[idx];
      document.getElementById('vm-title').textContent = p.title;
      document.getElementById('vm-date').textContent = p.date;
      document.getElementById('vm-content').textContent = p.content;
      document.getElementById('view-modal-overlay').classList.add('open');
    }

    function closeViewModal() { document.getElementById('view-modal-overlay').classList.remove('open'); }
    function filterPosts(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBlogs(cat);
    }
    document.addEventListener('DOMContentLoaded', fetchBlogs);
  </script>
</body>
</html>
